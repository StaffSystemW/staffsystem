version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - sql_data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - backend-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$SQL_PASSWORD" -C -Q "SELECT 1" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  auth-api:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  profile-api:
    build:
      context: ./ProfileService
      dockerfile: Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  booking-api:
    build:
      context: ./BookingService
      dockerfile: Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  workshift-api:
    build:
      context: ./WorkshiftService
      dockerfile: Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  yarp-gateway:
    build:
      context: ./YarpGateway
      dockerfile: Dockerfile
    depends_on:
      auth-api:
        condition: service_healthy
      profile-api:
        condition: service_healthy
      booking-api:
        condition: service_healthy
      workshift-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    depends_on:
      yarp-gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend-network

volumes:
  sql_data:

networks:
  backend-network:
    driver: bridge
